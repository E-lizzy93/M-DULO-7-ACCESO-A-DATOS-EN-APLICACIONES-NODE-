<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Órdenes</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="icono">🛒</div>
    <h2>Órdenes + pg</h2>
    <span>Módulo 7 — Transacciones</span>
  </div>
  <nav class="sidebar-nav">
    <a href="/index.html"><span class="nav-icono">🏠</span> Inicio</a>
    <a href="/productos.html"><span class="nav-icono">📦</span> Productos</a>
    <a href="/ordenes.html" class="activo"><span class="nav-icono">📋</span> Órdenes</a>
    <a href="/nueva-orden.html"><span class="nav-icono">➕</span> Nueva Orden</a>
  </nav>
  <div class="sidebar-footer">Node.js + pg + PostgreSQL</div>
</aside>

<main class="main">
  <div class="page-header">
    <div>
      <h1>📋 Órdenes por cliente</h1>
      <p>Selecciona un cliente o ingresa su RUT manualmente</p>
    </div>
  </div>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start">

    <!-- Panel búsqueda -->
    <div>
      <div class="panel">
        <div class="panel-titulo">🔍 Buscar por RUT</div>
        <div class="form-grupo">
          <label>RUT del cliente</label>
          <input type="text" id="rut" placeholder="Ej: 12345678-9">
        </div>
        <div class="form-acciones">
          <button class="btn btn-naranja" onclick="buscarOrdenes()">Buscar órdenes</button>
        </div>
        <div class="alerta" id="alerta"></div>
      </div>

      <!-- Clientes disponibles -->
      <div class="panel">
        <div class="panel-titulo">👥 Clientes disponibles</div>
        <div id="clientes-lista"><div class="loading">Cargando...</div></div>
      </div>
    </div>

    <!-- Resultados -->
    <div id="contenido"></div>
  </div>
</main>

<div class="toast" id="toast"></div>
<script>
  const $ = id => document.getElementById(id);

  function toast(txt, tipo = 'ok') {
    const el = $('toast');
    el.textContent = txt;
    el.className = `toast ${tipo} visible`;
    setTimeout(() => el.classList.remove('visible'), 3500);
  }

  function formatPesos(n) {
    return '$' + Number(n).toLocaleString('es-CL');
  }

  function mostrarAlerta(txt, tipo) {
    const el = $('alerta');
    const ic = { ok: '✅', error: '❌' };
    el.innerHTML = `<span>${ic[tipo]}</span><div>${txt}</div>`;
    el.className = `alerta alerta-${tipo} visible`;
  }

  // Cargar clientes disponibles
  async function cargarClientes() {
    try {
      const res  = await fetch('/api?filtro=clientes');
      const json = await res.json();
      if (!json.ok) return;
      $('clientes-lista').innerHTML = json.data.map(c => `
        <div style="display:flex; justify-content:space-between; align-items:center;
                    padding:10px 0; border-bottom:1px solid var(--borde)">
          <div>
            <div style="font-size:0.88rem; color:var(--blanco); font-weight:600">${c.nombre}</div>
            <div style="font-size:0.78rem; color:var(--txt-dim)">${c.rut}</div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="seleccionarCliente('${c.rut}')">
            Ver órdenes
          </button>
        </div>`).join('');
    } catch {}
  }

  function seleccionarCliente(rut) {
    $('rut').value = rut;
    buscarOrdenes();
  }

  async function buscarOrdenes() {
    const rut = $('rut').value.trim();
    if (!rut) { mostrarAlerta('Ingresa un RUT para buscar.', 'error'); return; }

    $('contenido').innerHTML = '<div class="loading">Buscando órdenes...</div>';

    try {
      const res  = await fetch(`/api?filtro=ordenes&rut=${rut}`);
      const json = await res.json();

      if (!json.ok) {
        $('contenido').innerHTML = '';
        mostrarAlerta(json.mensaje, 'error');
        return;
      }

      $('alerta').className = 'alerta';
      $('contenido').innerHTML = `
        <div class="panel">
          <div class="panel-titulo">📋 ${json.data[0].cliente} — ${json.data.length} orden(es)</div>
          ${json.data.map(o => `
            <div style="padding:14px 0; border-bottom:1px solid var(--borde)">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
                <span class="badge-id">#${o.id_orden}</span>
                <span class="precio">${formatPesos(o.precio_total)}</span>
              </div>
              <div style="font-size:0.82rem; color:var(--txt-dim); margin-bottom:8px">📍 ${o.direccion}</div>
              <button class="btn btn-ghost btn-sm" onclick="verProductos(${o.id_orden}, this)">
                Ver productos
              </button>
              <div id="prod-${o.id_orden}" style="margin-top:10px"></div>
            </div>`).join('')}
        </div>`;
      toast(`${json.data.length} orden(es) encontrada(s)`, 'ok');
    } catch {
      $('contenido').innerHTML = '';
      mostrarAlerta('Error al conectar con el servidor', 'error');
    }
  }

  async function verProductos(idOrden, btn) {
    const detalle = document.getElementById(`prod-${idOrden}`);
    btn.disabled = true;
    try {
      const res  = await fetch(`/api?filtro=productos&orden=${idOrden}`);
      const json = await res.json();
      if (!json.ok) { detalle.innerHTML = `<div style="color:var(--rojo);font-size:0.82rem">${json.mensaje}</div>`; return; }
      detalle.innerHTML = `
        <table style="margin-top:6px">
          <thead><tr><th>Producto</th><th>Precio</th><th>Cant.</th><th>Subtotal</th></tr></thead>
          <tbody>
            ${json.data.map(p => `
              <tr>
                <td>${p.nombre}</td>
                <td>$${Number(p.precio).toLocaleString('es-CL')}</td>
                <td>${p.cantidad_producto}</td>
                <td class="precio">$${Number(p.subtotal).toLocaleString('es-CL')}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
      btn.style.display = 'none';
    } catch {
      detalle.innerHTML = '<div style="color:var(--rojo);font-size:0.82rem">Error al cargar productos</div>';
      btn.disabled = false;
    }
  }

  $('rut').addEventListener('keydown', e => { if (e.key === 'Enter') buscarOrdenes(); });
  cargarClientes();
</script>
</body>
</html>
